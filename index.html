<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Connection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="background" class="background-content">
    <h1>Direct Connection</h1>

    <div class="card">
      <input id="sessionId" type="text" placeholder="Enter Session ID">

      <div class="buttons">
        <button id="createBtn">Create Session</button>
        <button id="joinBtn">Join Session</button>
      </div>

      <div id="status"></div>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="overlay" class="overlay">
    <div class="modal">
      <h2>Secure Direct Connection</h2>

      <p>
        This site will attempt to establish a direct encrypted peer-to-peer
        connection to Anir's device. After connection establishment,
        communication will not pass through third-party companies.
      </p>

      <button id="approveBtn">Approve</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
